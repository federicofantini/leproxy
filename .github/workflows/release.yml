name: RELEASE

on:
  push:
    tags: [ 'v*.*.*' ]


jobs:
  healthcheck:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker
        options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Launch Docker Compose
        working-directory: .
        run: |
          docker-compose up -d
          echo "Waiting healthcheck..."
          sleep 20
          docker-compose ps
          if ! docker inspect --format='{{json .State.Health.Status}}' $(docker-compose ps -q | head -n 1) | grep -q '"healthy"'; then
            echo "ERROR: Container not healthy"
            exit 1
          fi

  push-image:
    needs: healthcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tag variable
        id: vars
        run: echo "tag=v1.2.3" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: ./docker
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/leproxy:${{ github.ref_name }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/leproxy:latest
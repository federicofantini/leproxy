name: RELEASE

on:
  push:
    tags: [ 'v*.*.*' ]


jobs:
  healthcheck:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker
        options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Launch Docker Compose
        working-directory: .
        run: |
          docker-compose up -d
          echo "Waiting healthcheck..."
          sleep 20
          docker-compose ps
          for container_id in $(docker-compose ps -q); do
            status=$(docker inspect --format='{{json .State.Health.Status}}' "$container_id")
            echo "Container $container_id health status: $status"
            if [ "$status" != "\"healthy\"" ]; then
              echo "ERROR: Container $container_id is not healthy"
              exit 1
            fi
          done

  push-image:
    needs: healthcheck
    runs-on: ubuntu-latest

    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/leproxy:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/leproxy:latest